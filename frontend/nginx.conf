server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: every non-asset request returns index.html so React Router
  # can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy the WebSocket to the backend container.
  location /ws {
    proxy_pass http://backend:8787/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 1d;
    proxy_send_timeout 1d;
  }

  # Optional HTTP API passthrough (currently just /health).
  location /api/ {
    proxy_pass http://backend:8787/;
    proxy_set_header Host $host;
  }

  # Long-term cache for fingerprinted assets, no-cache for index.html.
  location ~* \.(?:js|css|woff2?|png|jpg|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Compress everything text-ish.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 512;
}
