name: Auto Pipeline Daemon — Status Monitor (dry-run only)

on:
  # Runs every 6 hours to log pipeline status. No claude invocations — free.
  # Live execution runs on your local machine via run-daemon-local.sh
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-pipeline-daemon
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daemon:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        run: npm install --no-audit --no-fund

      - name: Check kill switch
        id: pause
        working-directory: .
        run: |
          if [ -f PAUSE_AUTOMATION ]; then
            echo "PAUSE_AUTOMATION present — skipping daemon run"
            echo "paused=true" >> "$GITHUB_OUTPUT"
          else
            echo "paused=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run orchestrator daemon (dry-run status check)
        if: steps.pause.outputs.paused == 'false'
        run: npm run daemon
        env:
          BOOKFACTORY_ROOT: ${{ github.workspace }}

      - name: Commit activity log
        if: steps.pause.outputs.paused == 'false'
        working-directory: .
        run: |
          git config user.name "bookfactory-daemon"
          git config user.email "daemon@bookfactory.local"

          git add NOTIFICATIONS.md 2>/dev/null || true
          git add AUTOMATION-LOG.md 2>/dev/null || true
          git add books/fix-your-gut-for-good/.spend-log.json 2>/dev/null || true
          git add books/the-dust-between-seconds/.spend-log.json 2>/dev/null || true
          git add books/untitled-cosy-mystery/.spend-log.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No daemon-produced changes to commit."
            exit 0
          fi

          git commit -m "daemon: $(date -u +'%Y-%m-%dT%H:%M:%SZ') status check"
          git push
