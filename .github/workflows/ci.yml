name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  # ── Phase 1 & 2: Backend unit + integration tests ───────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Compile
        run: npm run build
      - name: Unit & integration tests
        run: npm run test

  # ── Phase 3: Frontend unit + component tests ─────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Production build
        run: npm run build
      - name: Unit & component tests
        run: npm run test

  # ── Phase 4: Playwright E2E smoke tests ──────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Build demo bundle
        run: VITE_DEMO=true npm run build -- --mode demo
        env:
          VITE_DEMO: "true"
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run E2E smoke tests
        run: npm run e2e
